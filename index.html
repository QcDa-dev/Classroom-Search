<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教室検索 | QcDa Project</title>
    <meta name="description" content="大学の空き教室を簡単に検索できるツールです。建物、曜日、時限を指定して素早く空き状況を確認できます。">
    <meta name="keywords" content="教室検索, 空き教室, 時間割, 大学, QcDa Project">
    
    <!-- アイコン設定 -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/svg+xml" href="icon.svg">

    <!-- 共通スタイルシート -->
    <link rel="stylesheet" href="common.css">

    <!-- モジュールとして読み込む (Firebaseを使用するため) -->
    <script type="module" src="common.js" defer></script>
</head>
<body>
    <!-- ヘッダーとハンバーガーメニュー、フッターは common.js で自動生成されます -->

    <main>
        <!-- オンボーディング(Welcome)画面 -->
        <div class="card text-center" style="margin-top: 10vh;">
            <h2 style="font-size: 1.5rem; margin-bottom: 20px;">空き教室を、もっと探しやすく。</h2>
            <p style="color: var(--qcda-text-light); margin-bottom: 30px; line-height: 1.6;">
                建物や時間、曜日を指定して、<br>
                今使える教室を簡単に検索できます。
            </p>
            
            <!-- 検索画面への遷移ボタン -->
            <!-- ※search.htmlは今後のステップで作成します -->
            <a href="search.html" class="btn">検索をはじめる</a>
            
            <!-- 管理者用データ更新画面へのリンク（開発用として一旦配置） -->
            <!-- ※admin.htmlは今後のステップで作成します -->
            <div style="margin-top: 30px;">
                <a href="admin.html" style="font-size: 0.9rem; text-decoration: underline;">データ更新</a>
            </div>
        </div>
    </main>

</body>
</html>
