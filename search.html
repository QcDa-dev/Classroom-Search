<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空き教室検索 | QcDa Project</title>
    
    <!-- アイコン設定 -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/svg+xml" href="icon.svg">

    <!-- 共通スタイルシート -->
    <link rel="stylesheet" href="common.css">
    
    <!-- ページ個別スタイル -->
    <style>
        .search-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .input-group label {
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--qcda-text-main);
        }
        .form-control {
            padding: 10px;
            font-size: 1rem;
            border: 1px solid var(--qcda-border);
            border-radius: 6px;
            background-color: var(--qcda-white);
            box-sizing: border-box;
            width: 100%;
        }
        .flex-row {
            display: flex;
            gap: 10px;
        }
        .flex-row .input-group {
            flex: 1;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 6px;
            background-color: #e9ecef;
            min-height: 80px;
        }
        .result-title {
            font-size: 1rem;
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
        }
        .result-content {
            font-size: 1.1rem;
            line-height: 1.6;
            word-wrap: break-word;
        }
        .room-badge {
            display: inline-block;
            background-color: var(--qcda-primary);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            margin: 0 5px 5px 0;
            font-size: 0.95rem;
        }
        .loading {
            text-align: center;
            color: var(--qcda-text-light);
            font-size: 0.9rem;
            display: none; /* 初期非表示 */
            margin-top: 10px;
        }
    </style>

    <!-- モジュールとして読み込む (Firebaseを使用するため) -->
    <script type="module" src="common.js" defer></script>
    
    <script type="module">
        import { db } from './common.js';
        import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // マスターデータ: 建物の全教室リスト
        const roomMaster = {
            "1号": ["101", "102", "103", "104", "105", "106", "107", "109", "110", "120", "147", "148", "201", "202", "203", "204", "205", "206", "207", "208", "209", "210", "220", "230", "240", "301", "302", "303", "304", "308", "309", "310", "320", "330", "340", "350"],
            "6号": ["101", "104", "105", "106", "201", "202", "203", "204", "205", "206", "207", "208", "209", "210", "211", "212", "213", "301", "302", "303", "304", "305", "306", "307", "308", "309", "310", "311", "312", "313", "401", "402", "403", "404"]
        };

        document.addEventListener('DOMContentLoaded', () => {
            const searchBtn = document.getElementById('searchBtn');
            const bldgSelect = document.getElementById('buildingSelect');
            const termSelect = document.getElementById('termSelect');
            const daySelect = document.getElementById('daySelect');
            const periodSelect = document.getElementById('periodSelect');
            
            const loadingIndicator = document.getElementById('loadingIndicator');
            const resultBox = document.getElementById('resultBox');
            const resultContent = document.getElementById('resultContent');
            const resultTitle = document.getElementById('resultTitle');

            // --- 検索処理 ---
            searchBtn.addEventListener('click', async () => {
                const building = bldgSelect.value;
                const term = termSelect.value;
                const day = daySelect.value;
                const period = periodSelect.value;

                if (!building || !term) {
                    alert("建物と開講時期を選択してください。");
                    return;
                }

                loadingIndicator.style.display = 'block';
                resultBox.classList.add('hidden');
                resultContent.innerHTML = '';
                searchBtn.disabled = true;

                try {
                    // 1. Firebaseから対象の建物のデータを取得
                    const classesRef = collection(db, "classes");
                    const q = query(classesRef, where("building", "==", building));
                    const querySnapshot = await getDocs(q);

                    // 2. ブラウザ側で詳細なフィルタリングと空き教室の算出
                    const allRooms = new Set(roomMaster[building]); // マスターデータから全教室を取得
                    const occupiedRooms = new Set(); // 授業で使われている教室リスト

                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        
                        // 教室名がないデータは除外
                        if (!data.room) return;

                        // 開講時期の部分一致チェック（「後期」と入力されて「後期Ⅰ」等にヒットさせるため）
                        if (data.term && data.term.includes(term)) {
                            // 曜日と時限が一致するかチェック (半角/全角の違いなどを考慮して緩やかに比較)
                            if (data.day === day && data.period === String(period)) { // String()で確実に文字列比較
                                occupiedRooms.add(data.room);
                            }
                        }
                    });

                    // 3. 全教室から使われている教室を引いて、空き教室を算出
                    const emptyRooms = [];
                    allRooms.forEach(room => {
                        if (!occupiedRooms.has(room)) {
                            emptyRooms.push(room);
                        }
                    });

                    // 4. 画面に表示
                    const titleText = `${building} (${term}) - ${day}曜日 ${period}限 の空き教室`;
                    
                    if (emptyRooms.length > 0) {
                        const html = emptyRooms.map(r => `<span class="room-badge">${r}</span>`).join('');
                        showResult(html, titleText);
                    } else {
                        showResult("該当する条件の空き教室はありません。", titleText);
                    }

                } catch (error) {
                    console.error("検索エラー:", error);
                    showResult(`エラーが発生しました: ${error.message}`, "検索エラー");
                } finally {
                    loadingIndicator.style.display = 'none';
                    searchBtn.disabled = false;
                }
            });

            function showResult(htmlContent, title) {
                resultTitle.textContent = title;
                resultContent.innerHTML = htmlContent;
                resultBox.classList.remove('hidden');
            }
        });
    </script>
</head>
<body>
    <main>
        <div class="card">
            <h2 style="font-size: 1.2rem; border-bottom: 2px solid var(--qcda-border); padding-bottom: 10px; margin-bottom: 20px;">
                空き教室検索
            </h2>
            
            <div class="search-container">
                <div class="input-group">
                    <label for="buildingSelect">建物</label>
                    <select id="buildingSelect" class="form-control">
                        <option value="1号">1号</option>
                        <option value="6号" selected>6号</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="termSelect">開講時期</label>
                    <select id="termSelect" class="form-control">
                        <option value="前期">前期</option>
                        <option value="後期" selected>後期</option>
                    </select>
                </div>

                <div class="flex-row">
                    <div class="input-group">
                        <label for="daySelect">曜日</label>
                        <select id="daySelect" class="form-control">
                            <option value="月">月</option>
                            <option value="火">火</option>
                            <option value="水">水</option>
                            <option value="木">木</option>
                            <option value="金">金</option>
                        </select>
                    </div>
                    
                    <div class="input-group">
                        <label for="periodSelect">時限</label>
                        <select id="periodSelect" class="form-control">
                            <option value="1">1限</option>
                            <option value="2">2限</option>
                            <option value="3">3限</option>
                            <option value="4">4限</option>
                            <option value="5">5限</option>
                            <option value="6">6限</option>
                        </select>
                    </div>
                </div>

                <button id="searchBtn" class="btn" style="margin-top: 10px;">空き教室を検索</button>
                <div id="loadingIndicator" class="loading">検索中... (初回は少し時間がかかります)</div>
            </div>
        </div>

        <!-- 検索結果表示エリア -->
        <div id="resultBox" class="card hidden">
            <div id="resultTitle" class="result-title">検索結果</div>
            <div id="resultContent" class="result-content">
                <!-- 結果がここに表示されます -->
            </div>
        </div>
        <div style="margin-top: 30px;">
            <a href="admin.html" style="font-size: 0.9rem; text-decoration: underline;">データ更新</a>
        </div>
    </main>
</body>
</html>
