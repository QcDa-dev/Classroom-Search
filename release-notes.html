<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リリースノート | QcDa Project</title>
    
    <!-- アイコン設定 -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="icon" type="image/svg+xml" href="icon.svg">

    <!-- 共通スタイルシート -->
    <link rel="stylesheet" href="common.css">
    
    <style>
        .release-item {
            border-bottom: 1px solid var(--qcda-border);
            padding: 20px 0;
        }
        .release-item:last-child {
            border-bottom: none;
        }
        .release-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .release-version {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--qcda-primary);
        }
        .release-date {
            font-size: 0.85rem;
            color: var(--qcda-text-light);
        }
        .release-badge {
            background-color: #28a745;
            color: white;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: bold;
        }
        .release-body {
            font-size: 0.95rem;
            line-height: 1.6;
            color: var(--qcda-text-main);
        }
        .release-body h1, .release-body h2, .release-body h3 {
            font-size: 1.05rem;
            margin-top: 15px;
            margin-bottom: 10px;
        }
        .release-body ul {
            padding-left: 20px;
            margin-bottom: 10px;
        }
        .release-body a {
            text-decoration: underline;
        }
        #loadingMsg, #errorMsg {
            text-align: center;
            padding: 20px;
            color: var(--qcda-text-light);
        }
        #errorMsg {
            color: var(--qcda-error);
        }
    </style>

    <!-- Markdownパーサー (GitHubのリリース本文をHTMLに変換するため) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- 共通スクリプト -->
    <script type="module" src="common.js" defer></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const releasesContainer = document.getElementById('releasesContainer');
            const loadingMsg = document.getElementById('loadingMsg');
            const errorMsg = document.getElementById('errorMsg');

            // ▼▼▼ リポジトリ名の設定 ▼▼▼
            // GitHubの「ユーザー名(または組織名)/リポジトリ名」に変更してください。
            // 例: qcda-dev/Classroom-Search
            const GITHUB_REPO = 'qcda-dev/Classroom-Search'; 
            // ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

            async function fetchReleases() {
                try {
                    const response = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/releases`);
                    
                    if (!response.ok) {
                        throw new Error(`GitHub APIエラー: ${response.status} ${response.statusText}`);
                    }
                    
                    const releases = await response.json();
                    loadingMsg.style.display = 'none';

                    if (releases.length === 0) {
                        releasesContainer.innerHTML = '<p class="text-center" style="color: var(--qcda-text-light);">まだリリース情報がありません。</p>';
                        return;
                    }

                    releases.forEach((release, index) => {
                        const releaseDiv = document.createElement('div');
                        releaseDiv.className = 'release-item';

                        // 日付のフォーマット (YYYY/MM/DD)
                        const date = new Date(release.published_at);
                        const formattedDate = `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日`;

                        // 最新リリースにはバッジをつける
                        const badgeHtml = index === 0 ? '<span class="release-badge">Latest</span>' : '';

                        // MarkdownをHTMLに変換（セキュリティ確保のためエスケープ等のオプションは環境に応じて調整可能）
                        const htmlBody = marked.parse(release.body || 'リリースノートはありません。');

                        releaseDiv.innerHTML = `
                            <div class="release-header">
                                <span class="release-version">${release.name || release.tag_name}</span>
                                ${badgeHtml}
                                <span class="release-date">${formattedDate}</span>
                            </div>
                            <div class="release-body">
                                ${htmlBody}
                            </div>
                        `;
                        releasesContainer.appendChild(releaseDiv);
                    });

                } catch (error) {
                    console.error("リリースノート取得エラー:", error);
                    loadingMsg.style.display = 'none';
                    errorMsg.style.display = 'block';
                    errorMsg.textContent = "リリース情報の取得に失敗しました。時間をおいて再度お試しください。";
                }
            }

            fetchReleases();
        });
    </script>
</head>
<body>
    <main>
        <div class="card">
            <h2 style="font-size: 1.2rem; border-bottom: 2px solid var(--qcda-border); padding-bottom: 10px; margin-bottom: 20px;">
                リリースノート
            </h2>
            
            <p style="font-size: 0.85rem; color: var(--qcda-text-light); margin-bottom: 20px;">
                新機能の追加や不具合修正の履歴を確認できます。
            </p>

            <div id="loadingMsg">読み込み中...</div>
            <div id="errorMsg" style="display: none;"></div>
            
            <div id="releasesContainer">
                <!-- ここにGitHub APIから取得したリリース情報が動的に挿入されます -->
            </div>
        </div>
    </main>
</body>
</html>
